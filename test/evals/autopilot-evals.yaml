        - "T002"
      # Records failure in state
      workflow_state:
        taskRetries.T001:
          min: 3
    severity: medium

  - name: "integration-error-git-conflict"
    description: "Git conflict halts and requires manual resolution"
    skill: "autopilot:full"
    setup: |
      mkdir -p specs/git-conflict
      cd specs/git-conflict
      git init
      echo 'original' > file.txt
      git add file.txt && git commit -m "initial"
      git checkout -b feature
      echo 'feature change' > file.txt
      git add file.txt && git commit -m "feature"
      git checkout main
      echo 'main change' > file.txt
      git add file.txt && git commit -m "main"
      git checkout feature
      # Now there's a conflict waiting
      cat > .workflow-state.json << 'EOF'
      {
        "version": 1,
        "feature": "git-conflict",
        "phase": "complete",
        "status": "in_progress"
      }
      EOF
    prompt: "/autopilot:full --resume"
    cwd: "specs/git-conflict"
    expect:
      output_contains:
        - "conflict"
        - "manual"
        - "resolution"
      exit_gracefully: true
    severity: high

  - name: "integration-error-analyze-limit"
    description: "Analyze loop limit halts with full diagnostic"
    skill: "autopilot:full"
    setup: |
      mkdir -p specs/analyze-loop
      cat > specs/analyze-loop/.workflow-state.json << 'EOF'
      {
        "version": 1,
        "feature": "analyze-loop",
        "phase": "analyze",
        "status": "in_progress",
        "iterations": {"spike": 1, "analyze": 4, "clarify": 0},
        "issues": [{"severity": "CRITICAL", "description": "Persistent issue"}],
        "limits": {"analyze": 5}
      }
      EOF
      cat > specs/analyze-loop/spec.md << 'EOF'
      # Spec with impossible requirement
      - Do the impossible thing that cannot be analyzed
      EOF
      cat > specs/analyze-loop/plan.md << 'EOF'
      # Plan
      EOF
      cat > specs/analyze-loop/tasks.md << 'EOF'
      # Tasks
      - [ ] T001: Impossible task
      EOF
    prompt: "/autopilot:full --resume"
    cwd: "specs/analyze-loop"
    expect:
      output_contains:
        - "Analyze loop exceeded"
        - "limit"
        - "issues remain"
      # Lists unresolved issues
      output_contains:
        - "CRITICAL"
        - "Persistent issue"
      workflow_state:
        status: ["failed", "halted"]
        iterations.analyze: 5
    severity: high

  - name: "integration-error-graceful-recovery"
    description: "Plan file with errors shows graceful degradation"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/integration-errors.md"
    timeout: 300
    setup: |
      mkdir -p {{working_dir}}
      cd {{working_dir}}
      git init
      echo '{"name": "test", "scripts": {"test": "echo ok"}}' > package.json
    expect:
      # Identifies problematic elements
      output_contains:
        - "ambiguous"
        - "contradictory"
      # Proceeds with warnings rather than crash
      exit_gracefully: true
      # Saves state for debugging
      files_exist:
        - "specs/*/.workflow-state.json"
    severity: medium

  # ---------------------------------------------------------------------------
  # State Persistence: Verify State Updates at Each Phase
  # ---------------------------------------------------------------------------

  - name: "integration-state-timestamps-updated"
    description: "State timestamps updated after each phase"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/integration-simple.md"
    timeout: 300
    expect:
      json_file: "specs/*/.workflow-state.json"
      json_values:
        timestamps.started:
          type: string
          format: iso8601
        timestamps.lastUpdated:
          type: string
          format: iso8601
          recent: 60
        timestamps.phaseStarted:
          type: string
          format: iso8601
    severity: medium

  - name: "integration-state-iterations-tracked"
    description: "Iteration counts tracked correctly"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/integration-simple.md"
    timeout: 300
    expect:
      json_file: "specs/*/.workflow-state.json"
      json_values:
        iterations:
          type: object
          required:
            - spike
            - analyze
            - clarify
            - verify
            - review
            - workflow
    severity: medium

  - name: "integration-state-agent-count-tracked"
    description: "Agent spawn counts tracked in state"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/integration-simple.md"
    timeout: 300
    expect:
      json_file: "specs/*/.workflow-state.json"
      json_values:
        agents.spawned:
          type: number
          min: 1
        agents.completed:
          type: number
          min: 0
        agents.failed:
          type: number
          min: 0
    severity: low

# ============================================================================
# BENCHMARKS
# ============================================================================

benchmarks:
  - name: "simple-feature-e2e"
    description: "End-to-end simple feature implementation"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/simple-plan.md"
    metrics:
      - elapsed_time
      - token_usage
      - agents_spawned
      - iterations_total
    baseline:
      elapsed_time_max: 300  # 5 minutes
      token_usage_max: 100000
      agents_spawned_max: 20

  - name: "complex-feature-e2e"
    description: "End-to-end complex feature implementation"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/complex-plan.md"
    timeout: 900
    metrics:
      - elapsed_time
      - token_usage
      - agents_spawned
      - iterations_total
      - tasks_completed
    baseline:
      elapsed_time_max: 600  # 10 minutes
      token_usage_max: 500000
      agents_spawned_max: 50

  - name: "spike-with-invalid-assumptions"
    description: "Spike phase with assumptions that will fail"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/risky-assumptions-plan.md"
    metrics:
      - spike_duration
      - assumptions_tested
      - deviations_found
    baseline:
      spike_duration_max: 180  # 3 minutes
