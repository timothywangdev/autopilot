integration:
  # ---------------------------------------------------------------------------
  # Happy Path: Simple Feature from Plan to Completion
  # ---------------------------------------------------------------------------

  - name: "integration-happy-path-simple-feature"
    description: "Full workflow: plan -> spike -> specify -> plan -> tasks -> implement -> verify -> review -> done"
    skill: "autopilot:full"
    prompt: "/autopilot:full test/fixtures/integration-simple.md"
    timeout: 300  # 5 minutes max
    setup: |
      mkdir -p {{working_dir}}
      cd {{working_dir}}
      git init
      echo '{"name": "test-project", "version": "1.0.0", "scripts": {"test": "echo passed"}}' > package.json
      echo '{"compilerOptions": {"strict": true, "noEmit": true}}' > tsconfig.json
      mkdir -p src
      echo 'export {}' > src/index.ts
    expect:
      # All phases execute
      phases_completed:
        - spike
        - specify
        - plan
        - tasks
        - implement
        - verify
        - review
      # All artifacts created
      files_exist:
        - "specs/*/original-plan.md"
        - "specs/*/spec.md"
        - "specs/*/plan.md"
        - "specs/*/tasks.md"
        - "specs/*/verification-report.md"
        - "specs/*/review-report.md"
        - "specs/*/.workflow-state.json"
      # Workflow completes successfully
      workflow_state:
        status: "done"
        phase: "complete"
      # No blocking prompts or checkpoints
      output_not_contains:
        - "CHECKPOINT"
        - "BLOCKER"
        - "HALT"
      # Tasks were executed
      json_file: "specs/*/.workflow-state.json"
      json_values:
        completedTasks:
          type: array
          min_length: 1
        agents.spawned:
          min: 1
    severity: critical

